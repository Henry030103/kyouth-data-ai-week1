<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Resume Helper Chatbot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .chat-container {
            max-width: 720px;
            margin: 40px auto;
        }

        .chat-history {
            height: 420px;
            overflow-y: auto;
            background-color: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 16px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 14px;
            margin-bottom: 12px;
            font-size: 14px;
            white-space: pre-wrap;
        }

        .bot-message {
            background-color: #e9ecef;
            color: #212529;
            margin-right: auto;
        }

        .user-message {
            background-color: #6f42c1;
            color: white;
            margin-left: auto;
        }

        .upload-label {
            cursor: pointer;
        }

        .small-note {
            font-size: 12px;
            color: #6c757d;
        }
    </style>
</head>

<body>
    <main class="container">
        <div class="chat-container">
            <h3 class="text-center mb-4">Resume Helper Chatbot</h3>

            <div id="chatHistory" class="chat-history">
                <div class="message bot-message">👋 How can I help you today?</div>
            </div>

            <div class="card mt-3">
                <div class="card-body">
                    <form id="chatForm">
                        <div class="mb-2">
                            <label for="pdfFile" class="form-label">Upload PDF resume or document</label>
                            <input class="form-control" type="file" id="pdfFile" accept="application/pdf">
                            <div class="small-note mt-1">
                                PDF text will be extracted and sent together with your message.
                            </div>
                        </div>

                        <div class="input-group">
                            <input type="text" id="userInput" class="form-control" placeholder="Type a message..."
                                autocomplete="off" required>

                            <button class="btn btn-primary" type="submit">
                                Send
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.min.mjs" type="module"></script>

    <script type="module">
        import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.min.mjs";

        pdfjsLib.GlobalWorkerOptions.workerSrc =
            "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.min.mjs";

        const backendUrl = "{{ backend_url }}";
        const chatForm = document.getElementById("chatForm");
        const chatHistory = document.getElementById("chatHistory");
        const userInput = document.getElementById("userInput");
        const pdfFile = document.getElementById("pdfFile");

        function addMessage(text, type) {
            const messageElement = document.createElement("div");
            messageElement.classList.add("message");

            if (type === "user") {
                messageElement.classList.add("user-message");
            } else {
                messageElement.classList.add("bot-message");
            }

            messageElement.textContent = text;
            chatHistory.appendChild(messageElement);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        async function extractPdfText(file) {
            if (!file) {
                return "";
            }

            const fileBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: fileBuffer }).promise;

            let extractedText = "";

            for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
                const page = await pdf.getPage(pageNumber);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(" ");
                extractedText += pageText + "\n";
            }

            return extractedText.trim();
        }

        chatForm.addEventListener("submit", async function (event) {
            event.preventDefault();

            const message = userInput.value.trim();
            const file = pdfFile.files[0];

            if (!message) {
                return;
            }

            addMessage(message, "user");
            userInput.value = "";

            try {
                const pdfText = await extractPdfText(file);

                const payload = {
                    message: message,
                    pdf_text: pdfText,
                    file_name: file ? file.name : null
                };

                if (file) {
                    addMessage(
                        `PDF attached: ${file.name}\nExtracted PDF text length: ${pdfText.length} characters`,
                        "bot"
                    );
                }

                console.log("JSON payload sent to backend:", payload);

                const response = await fetch(backendUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error("Backend server returned an error.");
                }

                const data = await response.json();
                const reply = data.reply || data.response || "Message sent successfully.";

                addMessage(reply, "bot");
            } catch (error) {
                addMessage(
                    "Message and PDF text were prepared as JSON, but backend is not available yet. Backend will be implemented tomorrow.",
                    "bot"
                );
                console.error(error);
            }
        });
    </script>
</body>

</html>
